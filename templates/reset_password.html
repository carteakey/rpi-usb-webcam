<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset - RPi Webcam Server</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <style>
        body {
            padding-top: 40px;
            padding-bottom: 40px;
            background-color: #f5f5f5;
        }
        .form-reset {
            width: 100%;
            max-width: 330px;
            padding: 15px;
            margin: auto;
        }
        .form-reset .form-control {
            position: relative;
            box-sizing: border-box;
            height: auto;
            padding: 10px;
            font-size: 16px;
        }
        .form-reset .form-control:focus {
            z-index: 2;
        }
        .form-reset input[type="password"] {
            margin-bottom: 10px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
        .alert {
            max-width: 330px;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center">
            <h1 class="h3 mb-3 font-weight-normal">Reset Password</h1>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success" role="alert">
            {{ success }}
        </div>
        {% endif %}

        {% if security_question %}
        <form class="form-reset" method="post" action="/reset-password">
            <div class="form-group">
                <label for="security_answer">Security Question: {{ security_question }}</label>
                <input type="text" id="security_answer" name="security_answer" class="form-control" placeholder="Your answer" required autofocus>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" placeholder="New password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
            </div>
            <input type="hidden" name="reset_token" value="{{ reset_token }}">
            <button class="btn btn-lg btn-primary btn-block" type="submit">Reset Password</button>
        </form>
        {% else %}
        <form class="form-reset" method="post" action="/request-reset">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Username" required autofocus>
            </div>
            <button class="btn btn-lg btn-primary btn-block" type="submit">Request Password Reset</button>
        </form>
        {% endif %}

        <p class="mt-3 text-center">
            <a href="/">Back to Login</a>
        </p>
    </div>
</body>
</html>
