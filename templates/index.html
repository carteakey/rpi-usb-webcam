<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webcam Server</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      background-color: #f8f9fa;
    }
    .navbar {
      margin-bottom: 20px;
      background-color: #343a40;
    }
    .user-info {
      color: #fff;
      margin-right: 15px;
    }
    .logout-link {
      color: #fff;
      text-decoration: none;
    }
    .logout-link:hover {
      text-decoration: underline;
      color: #f8f9fa;
    }
    .nav-link.active {
      font-weight: bold;
      background-color: rgba(255,255,255,0.1);
    }
    .card {
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .card-header {
      background-color: #6c757d;
      color: white;
      font-weight: bold;
    }
    video {
      max-width: 100%;
      border-radius: 5px;
    }
    .snapshot-img {
      cursor: pointer;
      transition: transform 0.2s;
      margin: 5px;
      border-radius: 5px;
    }
    .snapshot-img:hover {
      transform: scale(1.05);
    }
    .modal-img {
      max-width: 100%;
    }
    .settings-section {
      margin-bottom: 20px;
      padding: 15px;
      background-color: #f1f3f5;
      border-radius: 5px;
    }
    .progress {
      height: 5px;
      margin-top: 5px;
    }
    #system-info {
      font-size: 0.9rem;
    }
    #status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .status-on {
      background-color: #28a745;
    }
    .status-off {
      background-color: #dc3545;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-radius: 50%;
      border-top-color: #6c757d;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Webcam Server v4</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="#" onclick="switchView('live')">Live</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="switchView('snapshots')">Snapshots</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="switchView('timelapse')">Timelapses</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="switchView('settings')">Settings</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="switchView('system')">System</a>
          </li>
        </ul>
        <div class="ms-auto d-flex align-items-center">
          <div class="user-info">
            Logged in as: {{ session.username }}
          </div>
          <a href="/logout" class="logout-link">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="status-bar" class="mb-3">
      <div class="card">
        <div class="card-body py-2">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <span id="status-indicator" class="status-off"></span>
              <span id="status-text">Loading...</span>
            </div>
            <div>
              <button id="stream-toggle" class="btn btn-sm btn-primary">Start Stream</button>
              <button id="stream-restart" class="btn btn-sm btn-secondary">Restart</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="content-area">
      <!-- Views will be loaded here -->
    </div>
  </div>

  <!-- Image Preview Modal -->
  <div class="modal fade" id="imageModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Image Preview</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <img id="modalImage" class="modal-img" src="">
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Global variables
    let currentView = 'live';
    let systemInfo = null;
    let imageModal = null;
    let settings = null;

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize modal
      imageModal = new bootstrap.Modal(document.getElementById('imageModal'));

      // Load initial view
      switchView('live');

      // Setup event listeners
      document.getElementById('stream-toggle').addEventListener('click', toggleStream);
      document.getElementById('stream-restart').addEventListener('click', restartStream);

      // Update system info periodically
      updateSystemInfo();
      setInterval(updateSystemInfo, 10000);
    });

    // Switch between different views
    function switchView(view) {
      currentView = view;

      // Update navigation
      document.querySelectorAll('.nav-link').forEach(el => {
        el.classList.remove('active');
      });
      document.querySelector(`.nav-link[onclick="switchView('${view}')"]`).classList.add('active');

      // Get the content area
      const contentArea = document.getElementById('content-area');
      contentArea.innerHTML = '<div class="text-center p-5"><div class="loader"></div> Loading...</div>';

      // Load the appropriate view
      switch(view) {
        case 'live':
          loadLiveView();
          break;
        case 'snapshots':
          loadSnapshotsView();
          break;
        case 'timelapse':
          loadTimelapseView();
          break;
        case 'settings':
          loadSettingsView();
          break;
        case 'system':
          loadSystemView();
          break;
      }
    }

    // Live view functions
    function loadLiveView() {
      const contentArea = document.getElementById('content-area');
      contentArea.innerHTML = `
        <div class="card">
          <div class="card-header">Live Stream</div>
          <div class="card-body">
            <video id="hls-video" controls autoplay style="max-width:100%;"></video>
          </div>
        </div>
      `;

      initializePlayer();
    }

    function initializePlayer() {
      const video = document.getElementById('hls-video');
      if (!video) return;

      const videoSrc = '/static/hls/stream.m3u8';

      if (Hls.isSupported()) {
        const hls = new Hls({
          debug: false,
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 0
        });
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());

        // Error handling
        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal) {
            switch(data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                // Try to recover network error
                console.log('Fatal network error encountered, trying to recover');
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.log('Fatal media error encountered, trying to recover');
                hls.recoverMediaError();
                break;
              default:
                // Cannot recover
                console.log('Fatal error, cannot recover');
                hls.destroy();
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', () => video.play());
      } else {
        document.getElementById('content-area').innerHTML = '<div class="alert alert-danger">HLS not supported on this browser.</div>';
      }
    }

    // Snapshots view functions
    function loadSnapshotsView() {
      fetch('/snapshot_dates')
        .then(response => response.json())
        .then(dates => {
          if (dates.length === 0) {
            document.getElementById('content-area').innerHTML = `
              <div class="alert alert-info">No snapshots available yet.</div>
            `;
            return;
          }

          let html = `
            <div class="card">
              <div class="card-header">Snapshots</div>
              <div class="card-body">
                <div class="mb-3">
                  <label for="date-select" class="form-label">Select Date:</label>
                  <select id="date-select" class="form-select">
          `;

          dates.forEach(date => {
            html += `<option value="${date}">${date}</option>`;
          });

          html += `
                  </select>
                </div>
                <div class="mb-3">
                  <label for="interval-select" class="form-label">Interval:</label>
                  <select id="interval-select" class="form-select">
                    <option value="hour">Hourly</option>
                    <option value="sample">Sample (24 max)</option>
                    <option value="all">All</option>
                  </select>
                </div>
                <div id="snapshots-gallery" class="row">
                  <div class="text-center p-5"><div class="loader"></div> Loading snapshots...</div>
                </div>
              </div>
            </div>
          `;

          document.getElementById('content-area').innerHTML = html;

          // Add event listeners
          document.getElementById('date-select').addEventListener('change', loadSnapshotsForDate);
          document.getElementById('interval-select').addEventListener('change', loadSnapshotsForDate);

          // Load snapshots for the first date
          loadSnapshotsForDate();
        });
    }

    function loadSnapshotsForDate() {
      const dateSelect = document.getElementById('date-select');
      const intervalSelect = document.getElementById('interval-select');

      if (!dateSelect || !intervalSelect) return;

      const date = dateSelect.value;
      const interval = intervalSelect.value;

      document.getElementById('snapshots-gallery').innerHTML = `
        <div class="text-center p-5"><div class="loader"></div> Loading snapshots...</div>
      `;

      fetch(`/snapshots/${date}?interval=${interval}`)
        .then(response => response.json())
        .then(images => {
          const gallery = document.getElementById('snapshots-gallery');

          if (images.length === 0) {
            gallery.innerHTML = '<div class="col-12"><div class="alert alert-info">No snapshots available for this date.</div></div>';
            return;
          }

          let html = '';
          images.forEach(src => {
            const timestamp = src.split('/').pop().split('.')[0];
            const hour = timestamp.substring(0, 2);
            const minute = timestamp.substring(2, 4);
            const second = timestamp.substring(4, 6);

            html += `
              <div class="col-md-3 col-sm-4 col-6 mb-3">
                <div class="card">
                  <img src="${src}" class="card-img-top snapshot-img" onclick="showImageModal('${src}')">
                  <div class="card-footer text-center">
                    <small>${hour}:${minute}:${second}</small>
                  </div>
                </div>
              </div>
            `;
          });

          gallery.innerHTML = html;
        });
    }

    function showImageModal(src) {
      document.getElementById('modalImage').src = src;
      imageModal.show();
    }

    // Timelapse view functions
    function loadTimelapseView() {
      const contentArea = document.getElementById('content-area');

      let html = `
        <div class="card mb-3">
          <div class="card-header">Generate Timelapse</div>
          <div class="card-body">
            <form id="timelapse-form" class="row g-3">
              <div class="col-md-8">
                <label for="timelapse-date" class="form-label">Select Date:</label>
                <select id="timelapse-date" class="form-select" required>
                  <option value="">Loading dates...</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">&nbsp;</label>
                <button type="submit" class="btn btn-primary d-block">Generate Timelapse</button>
              </div>
            </form>
            <div id="timelapse-status" class="mt-3"></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">Available Timelapses</div>
          <div class="card-body">
            <div id="timelapse-gallery" class="row">
              <div class="text-center p-5"><div class="loader"></div> Loading timelapses...</div>
            </div>
          </div>
        </div>
      `;

      contentArea.innerHTML = html;

      // Load dates for the dropdown
      fetch('/snapshot_dates')
        .then(response => response.json())
        .then(dates => {
          const dateSelect = document.getElementById('timelapse-date');

          if (dates.length === 0) {
            dateSelect.innerHTML = '<option value="">No dates available</option>';
          } else {
            let options = '<option value="">Select a date</option>';
            dates.forEach(date => {
              options += `<option value="${date}">${date}</option>`;
            });
            dateSelect.innerHTML = options;
          }
        });

      // Load available timelapses
      loadAvailableTimelapses();

      // Add form submit handler
      document.getElementById('timelapse-form').addEventListener('submit', function(e) {
        e.preventDefault();
        generateTimelapse();
      });
    }

    function loadAvailableTimelapses() {
      fetch('/timelapses')
        .then(response => response.json())
        .then(videos => {
          const gallery = document.getElementById('timelapse-gallery');

          if (!videos || videos.length === 0) {
            gallery.innerHTML = '<div class="col-12"><div class="alert alert-info">No timelapse videos available yet.</div></div>';
            return;
          }

          let html = '';
          videos.forEach(src => {
            const filename = src.split('/').pop();
            const date = filename.split('_')[0];

            html += `
              <div class="col-lg-6 col-12 mb-3">
                <div class="card">
                  <div class="card-header">${date}</div>
                  <div class="card-body">
                    <video src="${src}" controls class="w-100"></video>
                  </div>
                </div>
              </div>
            `;
          });

          gallery.innerHTML = html;
        });
    }

    function generateTimelapse() {
      const dateSelect = document.getElementById('timelapse-date');
      const statusDiv = document.getElementById('timelapse-status');

      if (!dateSelect.value) {
        statusDiv.innerHTML = '<div class="alert alert-warning">Please select a date</div>';
        return;
      }

      statusDiv.innerHTML = '<div class="alert alert-info"><div class="loader"></div> Generating timelapse, this may take a while...</div>';

      fetch('/api/generate_timelapse', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          date: dateSelect.value
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          statusDiv.innerHTML = '<div class="alert alert-success">Timelapse generated successfully!</div>';
          loadAvailableTimelapses();
        } else {
          statusDiv.innerHTML = '<div class="alert alert-danger">Failed to generate timelapse. Check logs for details.</div>';
        }
      })
      .catch(error => {
        statusDiv.innerHTML = `<div class="alert alert-danger">Error: ${error}</div>`;
      });
    }

    // Settings view functions
    function loadSettingsView() {
      const contentArea = document.getElementById('content-area');
      contentArea.innerHTML = '<div class="text-center p-5"><div class="loader"></div> Loading settings...</div>';

      // Fetch current settings
      fetch('/api/settings')
        .then(response => response.json())
        .then(data => {
          settings = data;

          // Fetch available devices
          return fetch('/api/devices');
        })
        .then(response => response.json())
        .then(devices => {
          let html = `
            <div class="card">
              <div class="card-header">Settings</div>
              <div class="card-body">
                <form id="settings-form">
                  <ul class="nav nav-tabs" id="settingsTabs">
                    <li class="nav-item">
                      <a class="nav-link active" data-bs-toggle="tab" href="#videoSettings">Video</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" data-bs-toggle="tab" href="#audioSettings">Audio</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" data-bs-toggle="tab" href="#storageSettings">Storage</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" data-bs-toggle="tab" href="#authSettings">Authentication</a>
                    </li>
                  </ul>

                  <div class="tab-content p-3 border border-top-0 rounded-bottom">
                    <!-- Video Settings Tab -->
                    <div class="tab-pane fade show active" id="videoSettings">
                      <div class="mb-3">
                        <label for="video-device" class="form-label">Video Device:</label>
                        <select id="video-device" name="video[device]" class="form-select">
                          ${devices.webcams.map(webcam =>
                            `<option value="${webcam.path}" ${settings.video.device === webcam.path ? 'selected' : ''}>${webcam.name} (${webcam.path})</option>`
                          ).join('')}
                        </select>
                      </div>
                      <div class="mb-3">
                        <label for="video-resolution" class="form-label">Resolution:</label>
                        <select id="video-resolution" name="video[resolution]" class="form-select">
                          ${devices.resolutions.map(res =>
                            `<option value="${res}" ${settings.video.resolution === res ? 'selected' : ''}>${res}</option>`
                          ).join('')}
                        </select>
                      </div>
                      <div class="mb-3">
                        <label for="video-framerate" class="form-label">Framerate:</label>
                        <input type="number" id="video-framerate" name="video[framerate]" class="form-control" value="${settings.video.framerate}" min="1" max="60">
                      </div>
                      <div class="mb-3">
                        <label for="video-preset" class="form-label">Quality Preset:</label>
                        <select id="video-preset" name="video[preset]" class="form-select">
                          <option value="ultrafast" ${settings.video.preset === 'ultrafast' ? 'selected' : ''}>Ultrafast (Lowest Quality, Lowest CPU)</option>
                          <option value="superfast" ${settings.video.preset === 'superfast' ? 'selected' : ''}>Superfast</option>
                          <option value="veryfast" ${settings.video.preset === 'veryfast' ? 'selected' : ''}>Very Fast</option>
                          <option value="faster" ${settings.video.preset === 'faster' ? 'selected' : ''}>Faster</option>
                          <option value="fast" ${settings.video.preset === 'fast' ? 'selected' : ''}>Fast</option>
                          <option value="medium" ${settings.video.preset === 'medium' ? 'selected' : ''}>Medium (Balanced)</option>
                          <option value="slow" ${settings.video.preset === 'slow' ? 'selected' : ''}>Slow (Better Quality)</option>
                          <option value="slower" ${settings.video.preset === 'slower' ? 'selected' : ''}>Slower</option>
                        </select>
                      </div>
                      <div class="mb-3">
                        <label for="hls-time" class="form-label">HLS Segment Duration (seconds):</label>
                        <input type="number" id="hls-time" name="video[hls_time]" class="form-control" value="${settings.video.hls_time}" min="1" max="10">
                      </div>
                      <div class="mb-3">
                        <label for="hls-list-size" class="form-label">HLS List Size:</label>
                        <input type="number" id="hls-list-size" name="video[hls_list_size]" class="form-control" value="${settings.video.hls_list_size}" min="3" max="20">
                      </div>
                    </div>

                    <!-- Audio Settings Tab -->
                    <div class="tab-pane fade" id="audioSettings">
                      <div class="mb-3 form-check">
                        <input type="checkbox" id="audio-enabled" name="audio[enabled]" class="form-check-input" ${settings.audio.enabled ? 'checked' : ''}>
                        <label for="audio-enabled" class="form-check-label">Enable Audio</label>
                      </div>
                      <div id="audio-settings-group">
                        <div class="mb-3">
                          <label for="audio-device" class="form-label">Audio Device:</label>
                          <select id="audio-device" name="audio[device]" class="form-select">
                            ${devices.audio_devices.map(device =>
                              `<option value="${device.path}" ${settings.audio.device === device.path ? 'selected' : ''}>${device.name} (${device.path})</option>`
                            ).join('')}
                          </select>
                        </div>
                        <div class="mb-3">
                          <label for="audio-sample-rate" class="form-label">Sample Rate:</label>
                          <select id="audio-sample-rate" name="audio[sample_rate]" class="form-select">
                            <option value="8000" ${settings.audio.sample_rate == 8000 ? 'selected' : ''}>8000 Hz</option>
                            <option value="16000" ${settings.audio.sample_rate == 16000 ? 'selected' : ''}>16000 Hz</option>
                            <option value="22050" ${settings.audio.sample_rate == 22050 ? 'selected' : ''}>22050 Hz</option>
                            <option value="44100" ${settings.audio.sample_rate == 44100 ? 'selected' : ''}>44100 Hz</option>
                            <option value="48000" ${settings.audio.sample_rate == 48000 ? 'selected' : ''}>48000 Hz</option>
                          </select>
                        </div>
                        <div class="mb-3">
                          <label for="audio-bit-rate" class="form-label">Audio Bit Rate:</label>
                          <select id="audio-bit-rate" name="audio[bit_rate]" class="form-select">
                            <option value="64k" ${settings.audio.bit_rate === '64k' ? 'selected' : ''}>64 kbps</option>
                            <option value="96k" ${settings.audio.bit_rate === '96k' ? 'selected' : ''}>96 kbps</option>
                            <option value="128k" ${settings.audio.bit_rate === '128k' ? 'selected' : ''}>128 kbps</option>
                            <option value="192k" ${settings.audio.bit_rate === '192k' ? 'selected' : ''}>192 kbps</option>
                          </select>
                        </div>
                      </div>
                    </div>

                    <!-- Storage Settings Tab -->
                    <div class="tab-pane fade" id="storageSettings">
                      <div class="mb-3">
                        <label for="snapshot-interval" class="form-label">Snapshot Interval (seconds):</label>
                        <input type="number" id="snapshot-interval" name="general[snapshot_interval]" class="form-control" value="${settings.general.snapshot_interval}" min="5" max="3600">
                      </div>
                      <div class="mb-3">
                        <label for="max-days" class="form-label">Days to Keep Snapshots:</label>
                        <input type="number" id="max-days" name="general[max_days_to_keep]" class="form-control" value="${settings.general.max_days_to_keep}" min="1" max="365">
                      </div>
                      <div class="mb-3">
                        <label for="snapshot-dir" class="form-label">Snapshot Directory:</label>
                        <input type="text" id="snapshot-dir" name="storage[snapshot_dir]" class="form-control" value="${settings.storage.snapshot_dir}">
                      </div>
                      <div class="mb-3">
                        <label for="timelapse-dir" class="form-label">Timelapse Directory:</label>
                        <input type="text" id="timelapse-dir" name="storage[timelapse_dir]" class="form-control" value="${settings.storage.timelapse_dir}">
                      </div>
                      <div class="mb-3">
                        <label for="hls-dir" class="form-label">HLS Directory:</label>
                        <input type="text" id="hls-dir" name="storage[hls_dir]" class="form-control" value="${settings.storage.hls_dir}">
                      </div>
                    </div>

                    <!-- Authentication Settings Tab -->
                    <div class="tab-pane fade" id="authSettings">
                      <div class="mb-3">
                        <label for="auth-username" class="form-label">Username:</label>
                        <input type="text" id="auth-username" name="auth[username]" class="form-control" value="${settings.auth.username}">
                      </div>
                      <div class="mb-3">
                        <label for="auth-password" class="form-label">New Password:</label>
                        <input type="password" id="auth-password" name="auth[password]" class="form-control" placeholder="Leave blank to keep current password">
                      </div>
                    </div>
                  </div>

                  <div class="mt-3 text-end">
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                  </div>
                </form>
              </div>
            </div>
          `;

          contentArea.innerHTML = html;

          // Add event listeners
          document.getElementById('audio-enabled').addEventListener('change', function() {
            const audioGroup = document.getElementById('audio-settings-group');
            audioGroup.style.display = this.checked ? 'block' : 'none';
          });

          // Trigger the display logic for audio settings
          const audioEnabled = document.getElementById('audio-enabled').checked;
          document.getElementById('audio-settings-group').style.display = audioEnabled ? 'block' : 'none';

          // Add form submit handler
          document.getElementById('settings-form').addEventListener('submit', function(e) {
            e.preventDefault();
            saveSettings();
          });

          // Device change handler to update resolutions
          document.getElementById('video-device').addEventListener('change', updateResolutions);
        });
    }

    function updateResolutions() {
      const deviceSelect = document.getElementById('video-device');
      const resolutionSelect = document.getElementById('video-resolution');

      if (!deviceSelect || !resolutionSelect) return;

      const selectedDevice = deviceSelect.value;
      const currentResolution = resolutionSelect.value;

      resolutionSelect.innerHTML = '<option value="">Loading...</option>';

      fetch(`/api/resolutions?device=${selectedDevice}`)
        .then(response => response.json())
        .then(resolutions => {
          let options = '';
          resolutions.forEach(res => {
            options += `<option value="${res}" ${currentResolution === res ? 'selected' : ''}>${res}</option>`;
          });
          resolutionSelect.innerHTML = options;
        });
    }

    function saveSettings() {
      const form = document.getElementById('settings-form');
      const formData = new FormData(form);

      // Convert FormData to object structure
      const settings = {
        general: {},
        video: {},
        audio: {},
        storage: {},
        auth: {}
      };

      for (let [key, value] of formData.entries()) {
        // Parse the name like "video[device]" into section and key
        const match = key.match(/^([a-z]+)\[([a-z_]+)\]$/);
        if (match) {
          const section = match[1];
          const setting = match[2];

          // Convert to appropriate types
          if (setting === 'enabled') {
            value = value === 'on';
          } else if (setting === 'framerate' || setting === 'hls_time' ||
                    setting === 'hls_list_size' || setting === 'snapshot_interval' ||
                    setting === 'max_days_to_keep' || setting === 'sample_rate') {
            value = parseInt(value);
          }

          settings[section][setting] = value;
        }
      }

      // Submit settings
      fetch('/api/settings', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(settings)
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          alert('Settings saved successfully!');
          loadSettingsView(); // Reload with new settings
        } else {
          alert('Failed to save settings: ' + (data.error || 'Unknown error'));
        }
      })
      .catch(error => {
        alert('Error saving settings: ' + error);
      });
    }

    // System view functions
    function loadSystemView() {
      const contentArea = document.getElementById('content-area');

      let html = `
        <div class="card">
          <div class="card-header">System Information</div>
          <div class="card-body">
            <div id="system-info">
              <div class="text-center p-5"><div class="loader"></div> Loading system information...</div>
            </div>
          </div>
        </div>
      `;

      contentArea.innerHTML = html;

      // Load system information
      updateSystemInfoDisplay();
    }

    function updateSystemInfoDisplay() {
      if (!systemInfo) return;

      const infoDiv = document.getElementById('system-info');
      if (!infoDiv) return;

      const { hostname, ip_address, cpu_percent, memory_percent, disk_percent,
              uptime, temperature, stream_running, snapshot_date_count,
              latest_snapshot, timelapse_count, version } = systemInfo;

      let html = `
        <div class="row">
          <div class="col-md-6">
            <h5>Device Information</h5>
            <table class="table table-sm">
              <tr>
                <th>Hostname:</th>
                <td>${hostname}</td>
              </tr>
              <tr>
                <th>IP Address:</th>
                <td>${ip_address}</td>
              </tr>
              <tr>
                <th>Uptime:</th>
                <td>${uptime}</td>
              </tr>
              <tr>
                <th>Version:</th>
                <td>${version}</td>
              </tr>
            </table>
          </div>

          <div class="col-md-6">
            <h5>Resources</h5>
            <table class="table table-sm">
              <tr>
                <th>CPU Usage:</th>
                <td>
                  ${cpu_percent}%
                  <div class="progress">
                    <div class="progress-bar ${cpu_percent > 80 ? 'bg-danger' : cpu_percent > 60 ? 'bg-warning' : 'bg-success'}"
                         style="width: ${cpu_percent}%"></div>
                  </div>
                </td>
              </tr>
              <tr>
                <th>Memory Usage:</th>
                <td>
                  ${memory_percent}%
                  <div class="progress">
                    <div class="progress-bar ${memory_percent > 80 ? 'bg-danger' : memory_percent > 60 ? 'bg-warning' : 'bg-success'}"
                         style="width: ${memory_percent}%"></div>
                  </div>
                </td>
              </tr>
              <tr>
                <th>Disk Usage:</th>
                <td>
                  ${disk_percent}%
                  <div class="progress">
                    <div class="progress-bar ${disk_percent > 80 ? 'bg-danger' : disk_percent > 60 ? 'bg-warning' : 'bg-success'}"
                         style="width: ${disk_percent}%"></div>
                  </div>
                </td>
              </tr>
              ${temperature ? `
              <tr>
                <th>Temperature:</th>
                <td>
                  ${temperature.toFixed(1)}°C
                  <div class="progress">
                    <div class="progress-bar ${temperature > 70 ? 'bg-danger' : temperature > 60 ? 'bg-warning' : 'bg-success'}"
                         style="width: ${Math.min(100, temperature / 80 * 100)}%"></div>
                  </div>
                </td>
              </tr>
              ` : ''}
            </table>
          </div>
        </div>

        <div class="row mt-3">
          <div class="col-md-6">
            <h5>Camera Status</h5>
            <table class="table table-sm">
              <tr>
                <th>Stream Status:</th>
                <td>
                  <span class="badge ${stream_running ? 'bg-success' : 'bg-danger'}">
                    ${stream_running ? 'Running' : 'Stopped'}
                  </span>
                </td>
              </tr>
              <tr>
                <th>Snapshot Dates:</th>
                <td>${snapshot_date_count}</td>
              </tr>
              <tr>
                <th>Timelapse Videos:</th>
                <td>${timelapse_count}</td>
              </tr>
            </table>
          </div>

          <div class="col-md-6">
            <h5>Latest Snapshot</h5>
            ${latest_snapshot ? `
              <img src="${latest_snapshot}" class="img-fluid thumbnail" style="max-height: 150px; cursor: pointer;"
                   onclick="showImageModal('${latest_snapshot}')">
            ` : '<div class="alert alert-info">No snapshots available</div>'}
          </div>
        </div>
      `;

      infoDiv.innerHTML = html;
    }

    // System and status functions
    function updateSystemInfo() {
      fetch('/api/system')
        .then(response => response.json())
        .then(data => {
          systemInfo = data;

          // Update status indicator
          const indicator = document.getElementById('status-indicator');
          const statusText = document.getElementById('status-text');
          const streamToggle = document.getElementById('stream-toggle');

          if (data.stream_running) {
            indicator.className = 'status-on';
            statusText.textContent = 'Stream Running';
            streamToggle.textContent = 'Stop Stream';
            streamToggle.className = 'btn btn-sm btn-danger';
          } else {
            indicator.className = 'status-off';
            statusText.textContent = 'Stream Stopped';
            streamToggle.textContent = 'Start Stream';
            streamToggle.className = 'btn btn-sm btn-success';
          }

          // Update system info display if we're on that view
          if (currentView === 'system') {
            updateSystemInfoDisplay();
          }
        })
        .catch(error => {
          console.error('Error updating system info:', error);
        });
    }

    function toggleStream() {
      const action = systemInfo && systemInfo.stream_running ? 'stop' : 'start';
      const button = document.getElementById('stream-toggle');

      button.disabled = true;
      button.innerHTML = '<div class="loader"></div> Processing...';

      fetch('/api/stream_control', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          action: action
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          updateSystemInfo();
          if (action === 'start' && currentView === 'live') {
            // Reload player for live view
            setTimeout(() => {
              initializePlayer();
            }, 2000);
          }
        } else {
          alert('Failed to ' + action + ' stream: ' + (data.error || 'Unknown error'));
        }
        button.disabled = false;
      })
      .catch(error => {
        alert('Error: ' + error);
        button.disabled = false;
      });
    }

    function restartStream() {
      const button = document.getElementById('stream-restart');

      button.disabled = true;
      button.innerHTML = '<div class="loader"></div> Restarting...';

      fetch('/api/stream_control', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          action: 'restart'
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          updateSystemInfo();
          if (currentView === 'live') {
            // Reload player for live view
            setTimeout(() => {
              initializePlayer();
            }, 2000);
          }
        } else {
          alert('Failed to restart stream: ' + (data.error || 'Unknown error'));
        }
        button.disabled = false;
        button.textContent = 'Restart';
      })
      .catch(error => {
        alert('Error: ' + error);
        button.disabled = false;
        button.textContent = 'Restart';
      });
    }
  </script>
</body>
</html>
