<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>webcam</title>
<meta name="theme-color" content="#000000">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    color: #eee;
    user-select: none;
    cursor: none;
  }
  body.ui-visible { cursor: default; }

  #feed {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: block;
    background: #000;
  }

  /* ── UI fade wrapper ─────────────────────────────────────────────────── */
  #ui { opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
  #ui.visible { opacity: 1; pointer-events: auto; }

  /* ── Shared surface ──────────────────────────────────────────────────── */
  .surface {
    position: fixed;
    z-index: 10;
    background: rgba(0,0,0,0.38);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 8px;
    color: rgba(255,255,255,0.92);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
  }

  /* ── Top-left ────────────────────────────────────────────────────────── */
  #title-bar {
    top: 18px; left: 20px;
    padding: 6px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  #title-bar .name { font-size: 12px; font-weight: bold; letter-spacing: 0.1em; }
  #live-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.65);
  }
  #live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #e74c3c; animation: pulse 2s infinite; flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #viewer-count { color: rgba(255,255,255,0.4); }

  /* ── Top-right: clock ───────────────────────────────────────────────── */
  #info-bar {
    top: 18px; right: 20px;
    padding: 6px 14px;
    text-align: right;
    line-height: 1.8;
  }
  #info-bar .datetime { font-size: 10px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; }

  /* ── Bottom-right controls ──────────────────────────────────────────── */
  #controls {
    bottom: 20px; right: 20px;
    padding: 7px 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .ctrl-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.6);
    cursor: pointer; padding: 2px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: color 0.15s;
  }
  .ctrl-btn:hover { color: #fff; }
  .ctrl-btn svg { display: block; }

  /* ── Snapshot panel ─────────────────────────────────────────────────── */
  #snap-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 300px;
    z-index: 50;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    font-size: 11px;
  }
  #snap-panel.open { transform: translateX(0); }

  #snap-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.1em; font-size: 10px; color: rgba(255,255,255,0.5);
  }
  #snap-panel-header button {
    background: none; border: none; color: rgba(255,255,255,0.4);
    cursor: pointer; padding: 2px; display: flex; align-items: center;
  }
  #snap-panel-header button:hover { color: #fff; }

  #snap-scroll {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #snap-scroll::-webkit-scrollbar { width: 3px; }
  #snap-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .snap-day { display: flex; flex-direction: column; gap: 6px; }
  .snap-day-label { font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.35); padding-bottom: 2px; }
  .snap-pod {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    border-radius: 4px; display: block; cursor: pointer; transition: opacity 0.15s;
  }
  .snap-pod:hover { opacity: 0.85; }
  .snap-count { font-size: 9px; color: rgba(255,255,255,0.3); }

  #snap-timelapse-link {
    display: block; padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 10px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3); text-decoration: none;
    transition: color 0.15s; flex-shrink: 0;
  }
  #snap-timelapse-link:hover { color: rgba(255,255,255,0.75); }

  /* ── Snap panel btn ─────────────────────────────────────────────────── */
  #btn-snaps {
    background: none; border: none; color: rgba(255,255,255,0.5);
    cursor: pointer; padding: 1px; display: flex; align-items: center;
    transition: color 0.15s;
  }
  #btn-snaps:hover { color: rgba(255,255,255,0.9); }

  /* ── Connecting overlay ─────────────────────────────────────────────── */
  #connect-overlay {
    display: none; position: fixed; inset: 0; z-index: 20;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: rgba(255,255,255,0.45); font-size: 11px;
    letter-spacing: 0.12em; pointer-events: none;
  }
  #connect-overlay .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.12);
    border-top-color: rgba(255,255,255,0.5);
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Disk bar (bottom of screen, hidden until hover) ────────────────── */
  #disk-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 2px; z-index: 5;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  body.ui-visible #disk-bar-wrap { opacity: 1; }
  #disk-bar-bg { height: 100%; background: rgba(255,255,255,0.07); }
  #disk-bar-fill { height: 100%; background: rgba(255,255,255,0.3); width: 0%; transition: width 1s ease; }
  #disk-label {
    position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.1em; color: rgba(255,255,255,0.3);
    z-index: 6; pointer-events: none; white-space: nowrap;
    opacity: 0; transition: opacity 0.3s;
  }
  body.ui-visible #disk-label { opacity: 1; }
</style>
</head>
<body>

<video id="feed" autoplay muted playsinline></video>

<div id="ui">
  <!-- top-left -->
  <div class="surface" id="title-bar">
    <span class="name">webcam</span>
    <div id="live-badge">
      <span id="live-dot"></span>
      LIVE
      <span id="viewer-count"></span>
    </div>
    <button id="btn-snaps" title="Snapshots">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/><line x1="3" y1="9" x2="21" y2="9"/>
      </svg>
    </button>
  </div>

  <!-- top-right -->
  <div class="surface" id="info-bar">
    <div class="datetime" id="clock"></div>
  </div>

  <!-- bottom-right -->
  <div class="surface" id="controls">
    <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen">
      <svg id="icon-maximize" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
      <svg id="icon-minimize" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
      </svg>
    </button>
  </div>
</div>

<!-- snapshot panel -->
<div id="snap-panel">
  <div id="snap-panel-header">
    <span>SNAPSHOTS</span>
    <button id="btn-snaps-close" title="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div id="snap-scroll"></div>
  <a id="snap-timelapse-link" href="/timelapse">view timelapses →</a>
</div>

<!-- connecting overlay -->
<div id="connect-overlay">
  <div class="spinner"></div>
  <span>connecting</span>
</div>

<!-- disk usage bar -->
<div id="disk-bar-wrap">
  <div id="disk-bar-bg"><div id="disk-bar-fill"></div></div>
</div>
<div id="disk-label"></div>

<script>
// ── Auto-hide UI ──────────────────────────────────────────────────────────────
const ui = document.getElementById('ui');
let hideTimer;
function showUI() {
  ui.classList.add('visible'); document.body.classList.add('ui-visible');
  clearTimeout(hideTimer); hideTimer = setTimeout(hideUI, 3000);
}
function hideUI() { ui.classList.remove('visible'); document.body.classList.remove('ui-visible'); }
document.addEventListener('mousemove', showUI);
document.addEventListener('mousedown', showUI);
document.addEventListener('touchstart', showUI, { passive: true });
document.addEventListener('keydown', showUI);
ui.addEventListener('mouseenter', () => clearTimeout(hideTimer));
ui.addEventListener('mouseleave', () => { hideTimer = setTimeout(hideUI, 1500); });

// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase()
    + ' · ' + now.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
}
updateClock(); setInterval(updateClock, 1000);

// ── HLS stream ────────────────────────────────────────────────────────────────
const feed = document.getElementById('feed');
const HLS_SRC = '/hls/stream.m3u8';
const connectOverlay = document.getElementById('connect-overlay');
let hls, hlsFailing = false;

function showConnecting() { if (!hlsFailing) { hlsFailing = true; connectOverlay.style.display = 'flex'; } }
function hideConnecting() { hlsFailing = false; connectOverlay.style.display = 'none'; }
feed.addEventListener('playing', hideConnecting);

function initHLS() {
  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    if (hls) hls.destroy();
    hls = new Hls({ liveSyncDurationCount: 3, liveMaxLatencyDurationCount: 6, maxBufferLength: 10, backBufferLength: 0 });
    hls.loadSource(HLS_SRC);
    hls.attachMedia(feed);
    hls.on(Hls.Events.MANIFEST_PARSED, () => feed.play().catch(() => {}));
    hls.on(Hls.Events.ERROR, (_, data) => { if (data.fatal) { showConnecting(); setTimeout(initHLS, 3000); } });
  } else if (feed.canPlayType('application/vnd.apple.mpegurl')) {
    feed.src = HLS_SRC; feed.play().catch(() => {});
    feed.onerror = () => { showConnecting(); setTimeout(initHLS, 3000); };
  }
}
setTimeout(initHLS, 5000);

// ── Viewer count + heartbeat ──────────────────────────────────────────────────
const viewerEl = document.getElementById('viewer-count');
const SESSION_ID = (() => {
  let id = sessionStorage.getItem('wcam_sid');
  if (!id) { id = Math.random().toString(36).slice(2) + Date.now().toString(36); sessionStorage.setItem('wcam_sid', id); }
  return id;
})();

function sendHeartbeat() {
  fetch('/api/heartbeat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({sid: SESSION_ID}) }).catch(() => {});
}
function updateViewers() {
  fetch('/api/viewers').then(r => r.json())
    .then(d => { viewerEl.textContent = d.count > 0 ? `· ${d.count}` : ''; })
    .catch(() => {});
}
sendHeartbeat(); updateViewers();
setInterval(sendHeartbeat, 30000); setInterval(updateViewers, 15000);

// ── Fullscreen ────────────────────────────────────────────────────────────────
document.getElementById('btn-fullscreen').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
});
document.addEventListener('fullscreenchange', () => {
  const full = !!document.fullscreenElement;
  document.getElementById('icon-maximize').style.display = full ? 'none' : 'block';
  document.getElementById('icon-minimize').style.display = full ? 'block' : 'none';
  if (full && screen.orientation?.lock) screen.orientation.lock('landscape').catch(() => {});
});

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target !== document.body) return;
  if (e.code === 'KeyF') { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
});

// ── Snapshot panel ────────────────────────────────────────────────────────────
const snapPanel  = document.getElementById('snap-panel');
const snapScroll = document.getElementById('snap-scroll');

function openSnapPanel()  { snapPanel.classList.add('open'); if (!snapScroll.children.length) loadSnapshots(); }
function closeSnapPanel() { snapPanel.classList.remove('open'); }

document.getElementById('btn-snaps').addEventListener('click', openSnapPanel);
document.getElementById('btn-snaps-close').addEventListener('click', closeSnapPanel);
document.addEventListener('click', e => {
  if (snapPanel.classList.contains('open') && !snapPanel.contains(e.target) && e.target.id !== 'btn-snaps') closeSnapPanel();
});

function loadSnapshots() {
  fetch('/api/snapshots').then(r => r.json()).then(days => {
    snapScroll.innerHTML = '';
    if (!days.length) {
      snapScroll.innerHTML = '<div style="padding:12px;color:rgba(255,255,255,0.3);font-size:10px">no snapshots yet</div>';
      return;
    }
    days.forEach(day => {
      const el = document.createElement('div');
      el.className = 'snap-day';
      const label = day.date === new Date().toISOString().slice(0,10) ? 'TODAY' : day.date;
      el.innerHTML = `
        <div class="snap-day-label">${label}</div>
        <img class="snap-pod" loading="lazy" src="/static/snapshots/${day.date}/${day.pod}" title="${day.date}">
        <div class="snap-count">${day.count} snapshot${day.count !== 1 ? 's' : ''}</div>
      `;
      snapScroll.appendChild(el);
    });
  }).catch(() => {});
}

// ── Disk usage ────────────────────────────────────────────────────────────────
fetch('/api/disk').then(r => r.json()).then(d => {
  const used = d.total_gb - d.free_gb;
  const pct  = Math.min(100, Math.round(used / d.total_gb * 100));
  document.getElementById('disk-bar-fill').style.width = pct + '%';
  document.getElementById('disk-label').textContent =
    `${d.free_gb}GB free  ·  snaps ${d.snapshots_mb}MB  ·  tl ${d.timelapse_mb}MB`;
}).catch(() => {});
</script>
</body>
</html>
